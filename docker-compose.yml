version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: embrapaconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/embrapaconnect
      NEXTAUTH_SECRET: change-this-in-production-use-openssl-rand-base64-32
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN:-pk.placeholder}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_dev}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-00000000000000000000000000000000}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node_modules/.bin/prisma migrate deploy && node_modules/.bin/tsx prisma/seed.ts && node_modules/.bin/tsx server/index.ts"

volumes:
  postgres_data:
